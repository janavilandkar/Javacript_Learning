<!-- javascript code -->
<script>
    //Default function
    function myfun()
    {
        console.log("Hello!!")
    }
    myfun();

    //parametrice function
    function sum(x,y)
    {
        console.log("sum = ",x+y);
    }
    sum(10,20);

    //return value from function
    function mul(x,y)
    {
        console.log("before return");   //this line execute
        return x*y;
        console.log("after return");   //this line is not excute because after return not excute any line
    }
    console.log("mul = ",mul(20,3));
    // or
    let product=mul(20,2);
    console.log("mul = "+product);
</script>
