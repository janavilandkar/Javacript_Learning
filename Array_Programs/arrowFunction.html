<script>
    //parametrize arrow function
    const sum=(a,b)=>
    {
        console.log("sum = ",a+b);
    };
    sum(10,20)
    
    //default arrow function
    let print=()=>
    {
        console.log("Hiii...")
    }
    print()

    //return value from arrow function
    const mul=(x,y,z)=>
    {
        return x*y*z;
    }
    console.log("mul = ",mul(10,2,30));
</script>
