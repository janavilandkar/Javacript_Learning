<script>
    let str = "Enginerring";
    let vcount = 0, ccount = 0;
    const count = () => {
        for (let i of str) {
            if (i === 'a' || i === 'e' || i === 'i' || i === 'o' || i === 'u' || i === 'A' || i === 'E' || i === 'I' || i === 'O' || i === 'U') 
            {
                vcount++;
            }
            else {
                ccount++;
            }
        }
        return vcount, ccount;
    }
    count();
    console.log("vowel count = " + vcount);
    console.log("consonant count = " + ccount);
</script>
