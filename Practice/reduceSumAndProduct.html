<script>
    // array of num 1 to n
    let num=prompt("Enter number");
    let arr=[];
    for(let i=1;i<=num;i++)
    {
        arr[i-1]=i;
    }
    console.log(arr);

    // reduce array to calculate sum of number
    let sum=arr.reduce((res,current)=>
    {
        return res+current;
    })
    console.log("sum = ",sum);

     // reduce array to calculate mul of number
    let mul=arr.reduce((res,current)=>
     {
        return res*current;
     })
     console.log("mul = ",mul);
</script>
