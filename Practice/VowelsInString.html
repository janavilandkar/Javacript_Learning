<script>

    //count number of vowels and consonant in String
    let str="Enginerring";
    let vcount=0,ccount=0;
    for(let i of str)
    {
        if(i==='a'  || i==='e'  || i==='i'  || i==='o'  || i==='u'  || i==='A'  || i==='E'  || i==='I'  || i==='O'  || i==='U')
        {
            vcount++;
        }
        else{
            ccount++;
        }
    }
    console.log("vowel count = "+vcount);
    console.log("consonant count = "+ccount);
    // factorial of number
    let fact=1;
    let num=prompt("Enter a number");
    for(let i=1;i<=num;i++)
    {
        fact=fact*i;
    }
    console.log(`Factorial of ${num} = ${fact}`)
</script>
